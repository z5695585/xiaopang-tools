<h2>选择整体布局</h2>
<p class="subtitle">点击卡片选择你喜欢的布局方案</p>

<div class="cards">
  <div class="card" data-choice="sidebar" onclick="toggleSelect(this)">
    <div class="card-image" style="min-height:360px;">
      <div style="display:flex;min-height:360px;border:2px solid #e2e8f0;border-radius:8px;overflow:hidden;">
        <div style="width:200px;background:#1e293b;color:#e2e8f0;padding:14px;display:flex;flex-direction:column;gap:6px;">
          <div style="font-weight:700;font-size:14px;padding:4px 0 12px 0;border-bottom:1px solid #334155;">🧰 小胖工具</div>
          <div style="padding:8px 10px;background:#0ea5e9;border-radius:5px;font-size:12px;">📋 待办 & 总结</div>
          <div style="padding:8px 10px;color:#94a3b8;font-size:12px;">🔌 工具包 2</div>
          <div style="padding:8px 10px;color:#94a3b8;font-size:12px;">🔌 工具包 3</div>
          <div style="margin-top:auto;padding:8px 10px;border:1px dashed #475569;border-radius:5px;color:#64748b;font-size:11px;text-align:center;">+ 添加工具</div>
        </div>
        <div style="flex:1;background:#f8fafc;padding:20px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>侧边栏布局</h3>
      <p>左侧固定导航，工具多了纵向滚动即可，空间不受限</p>
    </div>
  </div>
  <div class="card" data-choice="topnav" onclick="toggleSelect(this)">
    <div class="card-image" style="min-height:360px;">
      <div style="display:flex;flex-direction:column;min-height:360px;border:2px solid #e2e8f0;border-radius:8px;overflow:hidden;">
        <div style="background:#1e293b;color:#e2e8f0;padding:10px 16px;display:flex;align-items:center;gap:16px;">
          <div style="font-weight:700;font-size:13px;">🧰 小胖工具</div>
          <div style="padding:5px 12px;background:#0ea5e9;border-radius:5px;font-size:11px;">📋 待办</div>
          <div style="color:#94a3b8;font-size:11px;">🔌 工具2</div>
          <div style="color:#94a3b8;font-size:11px;">🔌 工具3</div>
          <div style="margin-left:auto;color:#64748b;font-size:11px;">+ 添加</div>
        </div>
        <div style="flex:1;background:#f8fafc;padding:20px;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>顶部导航布局</h3>
      <p>顶部横向导航，内容区更宽，但工具多了可能放不下</p>
    </div>
  </div>
</div>
